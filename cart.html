<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Shopping Cart</title>
</head>
<body>
    <header><h1>ScentLab</h1></header>
    <main>
        <h2 style="text-align: center;">My Shopping Cart</h2>
        <ul class="cart-list">
            <li>
                <img src="perfume1.webp" width="80" alt="Perfume">
                <div><h3>Perfume</h3><p class="price">249.00</p></div>
                <input type="number" min="1" value="1" style="width: 50px;">
            </li>
            <li>
                <img src="alcohol.webp" width="80" alt="Alcohol">
                <div><h3>Alcohol</h3><p class="price">150.00</p></div>
                <input type="number" min="1" value="1" style="width: 50px;">
            </li>
        </ul>
        <div style="text-align: center; padding: 20px;">
            <h3>Total: <span class="price">399.00</span></h3>
            <button onclick="location.href='checkout.html'">Proceed to Checkout</button>
        </div>
    </main>
</body>
</html>
