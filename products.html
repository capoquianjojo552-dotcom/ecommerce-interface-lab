<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Products Listing</title>
</head>
<body>
    <header> 
       <h1>ScentLab</h1>
       <nav>
         <ul> 
            <li><a href="Landing.html">Home</a></li>
            <li><a href="products.html">Shop</a></li>
            <li><a href="cart.html">Cart</a></li>
         </ul>
       </nav>
    </header>

    <div class="products-container">
        <aside>
            <h2>Filters</h2>
            <form>
                <fieldset>
                    <legend>Categories</legend>
                    <label><input type="checkbox"> Perfume</label><br>
                    <label><input type="checkbox"> Alcohol</label>
                </fieldset>
                <button type="button" style="margin-top:10px">Apply</button>
            </form>
        </aside>

        <main class="product-grid">
            <article>
                <img src="perfume1.webp" alt="Perfume">
                <h3>Luxury Perfume</h3>
                <p class="price">249.00</p>
                <button onclick="location.href='detail.html'">View Details</button>
            </article>
            <article>
                <img src="alcohol.webp" alt="Alcohol">
                <h3>Hand Sanitizer</h3>
                <p class="price">150.00</p>
                <button onclick="location.href='detail.html'">View Details</button>
            </article>
            <article>
                <img src="Lotion.webp" alt="Lotion">
                <h3>Body Lotion</h3>
                <p class="price">289.00</p>
                <button onclick="location.href='detail.html'">View Details</button>
            </article>
        </main>
    </div>
</body>
</html>
